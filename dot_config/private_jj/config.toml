# :schema https://docs.jj-vcs.dev/latest/config-schema.json

[[--scope]]
--when.repositories = ["/workspaces/obsidian"]
[--scope.user]
email = "russell.blickhan@vanta.com"

[user]
email = "rwb@rwblickhan.org"
name = "Russell Blickhan"

[ui]
diff-formatter = "delta"
default-command = "log"

[merge-tools]
delta.diff-expected-exit-codes = [0, 1]

[templates]
draft_commit_description = '''
  concat(
    coalesce(description, default_commit_description, "\n"),
    surround(
      "\nJJ: This commit contains the following changes:\n", "",
      indent("JJ:     ", diff.stat(72)),
    ),
    "\nJJ: ignore-rest\n",
    diff.git(),
  )
'''

[revset-aliases]
# set all remote bookmarks to be immutable
'immutable_heads()' = "builtin_immutable_heads() | remote_bookmarks()"
'user(x)' = 'author(x) | committer(x)'
'mine()' = 'user("rwb@rwblickhan.org") | user("russell.blickhan@vanta.com")'
'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'closest_pushable(to)' = 'heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))'
# stack(x, n) is the set of mutable commits reachable from 'x',
# with 'n' parents. 'n' is often useful to customize the display
# and return set for certain operations. 'x' can be used to target
# the set of 'roots' to traverse, e.g. @ is the current stack.
'stack()' = 'stack(@)'
'stack(x)' = 'stack(x, 2)'
'stack(x, n)' = 'ancestors(reachable(x, mutable()), n)'

[revsets]
bookmark-advance-to = 'closest_pushable(@)'
log = 'present(@) | ancestors(immutable_heads().., 2) | present(trunk()) | bookmarks()'

[aliases]
init = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
jj git init --colocate
# only track origin branches, not upstream or others
jj bookmark track 'glob:*@origin'
""",
]
pr = [
  "util",
  "exec",
  "--",
  "bash",
  "-c",
  """
gh pr create --head $(jj log -r 'closest_bookmark(@)' -T 'bookmarks' --no-graph | cut -d ' ' -f 1)
""",
]

[jj-hooks]
advance-bookmarks = true
