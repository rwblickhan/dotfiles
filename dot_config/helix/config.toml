theme = "ayu_dark"

[editor]
line-number = "relative"

[editor.auto-save]
after-delay.enable = true

[editor.lsp]
inlay-hints-length-limit = 20

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "error"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.soft-wrap]
enable = true

[keys.normal]
# split navigation (vim-tmux-navigator style)
C-h = 'jump_view_left'
C-j = 'jump_view_down'
C-k = 'jump_view_up'
C-l = 'jump_view_right'

[keys.normal."space"]
i = ":toggle lsp.display-inlay-hints"
